name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubicloud-standard-2
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=$(echo $GITHUB_REF_NAME | sed 's/^v//')
          else
            # Get last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -z "$LAST_TAG" ]]; then
              # No tags yet, start with 0.1.0
              VERSION="0.1.0"
            else
              # Extract version parts and increment patch
              IFS='.' read -ra PARTS <<< "${LAST_TAG#v}"
              MAJOR=${PARTS[0]}
              MINOR=${PARTS[1]}
              PATCH=${PARTS[2]}
              PATCH=$((PATCH + 1))
              VERSION="$MAJOR.$MINOR.$PATCH"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.VERSION }}\"/" helm/foodbanks-web/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" helm/foodbanks-web/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package helm/foodbanks-web

      - name: Update deploy-stock versions
        if: github.ref == 'refs/heads/main'
        run: |
          # Check if DEPLOY_REPO_TOKEN is available
          if [[ -z "${{ secrets.DEPLOY_REPO_TOKEN }}" ]]; then
            echo "DEPLOY_REPO_TOKEN not configured, skipping deploy-stock update"
            exit 0
          fi
          
          # Clone deploy-stock repo with authentication
          git clone https://${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/foodbanks/deploy-stock.git
          cd deploy-stock
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update foodbanks-web version using yq or python
          python3 << EOF
          import yaml
          
          with open('versions.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          data['foodbanks-web'] = {
              'image': {
                  'tag': "${{ steps.version.outputs.VERSION }}"
              }
          }
          
          with open('versions.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          EOF
          
          # Commit and push
          git add versions.yaml
          git commit -m "Update foodbanks-web to version ${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Log in to GitHub Container Registry (Helm)
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart
        run: |
          CHART_VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          helm push foodbanks-web-*.tgz oci://${{ env.REGISTRY }}/foodbanks
