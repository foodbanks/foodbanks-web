name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubicloud-standard-2
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=$(echo $GITHUB_REF_NAME | sed 's/^v//')
          else
            # Get last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -z "$LAST_TAG" ]]; then
              # No tags yet, start with 0.1.0
              LAST_TAG="0.1.0"
              COMMIT_COUNT=$(git rev-list --count HEAD)
              COMMIT_SHA=$(git rev-parse --short HEAD)
              VERSION="${LAST_TAG}.${COMMIT_COUNT}+${COMMIT_SHA}"
            else
              # Count commits since last tag
              COMMIT_COUNT=$(git rev-list --count $LAST_TAG..HEAD)
              # Get short commit hash
              COMMIT_SHA=$(git rev-parse --short HEAD)
              # Generate version: last-tag.commit-count.githash
              VERSION="${LAST_TAG#v}.${COMMIT_COUNT}+${COMMIT_SHA}"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Package Helm chart
        run: |
          helm package helm/foodbanks-web

      - name: Log in to GitHub Container Registry (Helm)
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart
        run: |
          CHART_VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          helm push foodbanks-web-*.tgz oci://${{ env.REGISTRY }}/foodbanks
