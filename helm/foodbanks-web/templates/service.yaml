apiVersion: v1
kind: Service
metadata:
  name: foodbanks-web
  labels:
    app: foodbanks-web
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/health-check: '{"protocol": "HTTP", "port": 80, "requestPath": "/"}'
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: foodbanks-web
