image:
  repository: ghcr.io/foodbanks/foodbanks-web
  tag: latest

ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "static-ip-foodbanks-demo"
    networking.gke.io/managed-certificates: "foodbanksit.be-managed-cert"
  hosts:
    - host: dev.stock.foodbanksit.be
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dev-stock-foodbanksit-be-tls
      hosts:
        - dev.stock.foodbanksit.be

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
