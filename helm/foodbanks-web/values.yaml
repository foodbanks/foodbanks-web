image:
  repository: ghcr.io/foodbanks/foodbanks-web
  tag: latest

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: dev.stock.foodbanksit.be
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dev-stock-foodbanksit-be-tls
      hosts:
        - dev.stock.foodbanksit.be

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
